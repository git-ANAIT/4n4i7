<style>
:root{--c:#00f5ff;--c2:#00aaff;--c3:#7000ff;--g:#00ff88;--dark:#010409;--card:rgba(2,10,24,0.97);--text:#e8f4ff;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{height:100%;}
body{min-height:100vh;min-height:100dvh;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Rajdhani",sans-serif;overflow-x:hidden;overflow-y:auto;padding:1.5rem 1rem;}
#bg,#fx{position:fixed;inset:0;z-index:0;pointer-events:none;}
#fx{z-index:1;}
.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:3;animation:ptrise linear infinite;opacity:0;}
@keyframes ptrise{0%{transform:translateY(100vh) scale(1);opacity:0}10%{opacity:1}90%{opacity:0.4}100%{transform:translateY(-10vh) scale(0.3);opacity:0}}
.card{position:relative;z-index:10;width:100%;max-width:400px;background:var(--card);border:1px solid transparent;border-radius:4px;padding:2.4rem 2rem 2.4rem;display:flex;flex-direction:column;align-items:center;gap:0;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);animation:cardIn 1.4s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(50px) scale(0.93);filter:blur(4px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.card::before{content:"";position:absolute;inset:-1px;border-radius:4px;background:linear-gradient(90deg,var(--c),var(--c3),var(--c2),var(--c));background-size:300% 100%;animation:borderFlow 4s linear infinite;z-index:-1;opacity:0.6;}
.card::after{content:"";position:absolute;inset:0;border-radius:4px;background:var(--card);z-index:-1;}
@keyframes borderFlow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.top-glow{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,var(--c) 30%,#fff 50%,var(--c) 70%,transparent 100%);background-size:200% 100%;animation:glowSlide 2.5s ease-in-out infinite;border-radius:4px 4px 0 0;box-shadow:0 0 12px var(--c),0 0 30px rgba(0,245,255,0.6),0 0 60px rgba(0,245,255,0.3);}
@keyframes glowSlide{0%{background-position:-100% 0}100%{background-position:200% 0}}
.hc{position:absolute;width:22px;height:22px;border-color:var(--c);border-style:solid;animation:cornerPulse 2s ease-in-out infinite;}
.hc.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}.hc.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.hc.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}.hc.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
@keyframes cornerPulse{0%,100%{opacity:0.7}50%{opacity:1;box-shadow:0 0 10px var(--c),0 0 20px rgba(0,245,255,0.4)}}
.hc::after{content:"";position:absolute;width:5px;height:5px;background:var(--c);border-radius:50%;box-shadow:0 0 10px var(--c),0 0 20px var(--c);animation:dotPulse 2s ease-in-out infinite;}
.hc.tl::after{top:-2px;left:-2px}.hc.tr::after{top:-2px;right:-2px}.hc.bl::after{bottom:-2px;left:-2px}.hc.br::after{bottom:-2px;right:-2px}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5);box-shadow:0 0 15px var(--c),0 0 30px var(--c)}}
.sys-row{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;width:100%;}
.sys-id{font-family:"Orbitron",monospace;font-size:7px;letter-spacing:0.25em;color:var(--c);animation:flicker 5s ease-in-out infinite;}
@keyframes flicker{0%,98%,100%{opacity:0.5}99%{opacity:0.1}}
.sys-bar{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,245,255,0.3),transparent);}
.status-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:1.4rem;}
.s-dot{width:7px;height:7px;background:var(--g);border-radius:50%;animation:sdot 1.8s ease-in-out infinite;}
@keyframes sdot{0%,100%{box-shadow:0 0 4px var(--g);transform:scale(1)}50%{box-shadow:0 0 16px var(--g),0 0 30px rgba(0,255,136,0.5);transform:scale(1.3)}}
.s-txt{font-family:"Orbitron",monospace;font-size:7px;letter-spacing:0.22em;color:var(--g);text-transform:uppercase;}
.name-wrap{position:relative;margin-bottom:0.5rem;text-align:center;width:100%;}
.name{font-family:"Michroma","Exo 2",sans-serif;font-size:15px;font-weight:400;color:transparent;letter-spacing:0.22em;line-height:1.4;white-space:nowrap;text-transform:uppercase;background:linear-gradient(180deg,#ffffff 0%,#c8f4ff 25%,#00f5ff 50%,#0088cc 78%,#004488 100%);background-size:100% 200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:nameScanFill 3s ease-in-out infinite,nameGlow 3s ease-in-out infinite;display:inline-block;}
@keyframes nameScanFill{0%{background-position:0% 0%}50%{background-position:0% 100%}100%{background-position:0% 0%}}
@keyframes nameGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(0,245,255,0.9)) drop-shadow(0 0 10px rgba(0,245,255,0.5)) drop-shadow(0 0 22px rgba(0,200,255,0.25))}50%{filter:drop-shadow(0 0 8px rgba(0,245,255,1)) drop-shadow(0 0 20px rgba(0,245,255,0.8)) drop-shadow(0 0 45px rgba(0,200,255,0.5)) drop-shadow(0 0 70px rgba(0,140,255,0.25))}}
.name-underline{height:1px;margin-top:6px;margin-bottom:1.6rem;width:60%;margin-left:auto;margin-right:auto;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.5),transparent);background-size:200% 100%;animation:underlineFlow 3s linear infinite;box-shadow:0 0 3px rgba(0,245,255,0.4);}
@keyframes underlineFlow{0%{background-position:0% 0}100%{background-position:200% 0}}
.div-row{width:100%;display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;}
.dl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.3));}
.dr{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,245,255,0.3),transparent);}
.dt{font-family:"Orbitron",monospace;font-size:6px;letter-spacing:0.3em;color:var(--c);opacity:0.5;text-transform:uppercase;}
.links{width:100%;display:flex;flex-direction:column;gap:0.55rem;}
.lr{display:flex;align-items:center;gap:0.8rem;padding:0.7rem 1rem;border:1px solid rgba(0,245,255,0.08);border-radius:2px;text-decoration:none;background:rgba(0,245,255,0.02);transition:all 0.2s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.lr::before{content:"";position:absolute;left:-130%;top:0;bottom:0;width:120%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(0,245,255,0.03) 10%,rgba(0,245,255,0.12) 30%,rgba(0,200,255,0.22) 44%,rgba(255,255,255,0.18) 50%,rgba(0,200,255,0.22) 56%,rgba(0,245,255,0.12) 70%,rgba(0,245,255,0.03) 90%,transparent 100%);filter:blur(4px);animation:laserSweep 6s ease-in-out infinite;z-index:0;border-radius:2px;}
.lr:nth-child(1)::before{animation-delay:0s;}.lr:nth-child(2)::before{animation-delay:1.0s;}.lr:nth-child(3)::before{animation-delay:2.0s;}.lr:nth-child(4)::before{animation-delay:3.0s;}.lr:nth-child(5)::before{animation-delay:4.0s;}
.lr::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,245,255,0.06),transparent);opacity:0;transition:opacity 0.2s;z-index:0;}
.lr:hover,.lr:active{border-color:rgba(0,245,255,0.4);background:rgba(0,245,255,0.05);}
.lr:hover::after,.lr:active::after{opacity:1;}
.lr .li,.lr .ll,.lr .la{position:relative;z-index:1;}
@keyframes laserSweep{0%{left:-130%;opacity:0}8%{opacity:1}48%{left:130%;opacity:1}55%{opacity:0}100%{left:130%;opacity:0}}
.li{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.ll{font-size:11px;letter-spacing:0.08em;color:var(--text);opacity:0.85;flex:1;font-weight:500;}
.la{font-size:11px;color:var(--c);opacity:0.5;font-family:"Orbitron",monospace;}
.footer{margin-top:1.8rem;font-family:"Orbitron",monospace;font-size:6px;letter-spacing:0.2em;color:var(--c);opacity:0.25;text-transform:uppercase;text-align:center;}
@keyframes starTwinkle{0%,100%{opacity:0.1}50%{opacity:0.5}}
body.locked .card{opacity:0;pointer-events:none;}
body.locked #bg,body.locked #fx{opacity:0;}
@media(max-width:440px){.card{padding:2rem 1.4rem 2rem;}.name{font-size:12px;letter-spacing:0.12em;white-space:nowrap;}}

#bootHeaderDots{display:flex;gap:5px;}
#bootHeaderDots span{width:6px;height:6px;border-radius:50%;background:rgba(0,245,255,0.25);}
#bootHeaderDots span:nth-child(1){animation:bdot 1.6s ease-in-out infinite;}
#bootHeaderDots span:nth-child(2){animation:bdot 1.6s 0.2s ease-in-out infinite;}
#bootHeaderDots span:nth-child(3){animation:bdot 1.6s 0.4s ease-in-out infinite;}
@keyframes bdot{0%,100%{opacity:0.25}50%{opacity:1;background:var(--g);}}
#bootLog{font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.85;color:#9fd8e8;min-height:260px;}
.bln{display:flex;gap:0.6rem;white-space:pre;opacity:0;}
.bln .bprompt{color:rgba(0,245,255,0.5);flex-shrink:0;}
.bln .bmsg{color:#bfe9f2;}
.bln .bok{color:var(--g);font-weight:600;}
.bln .bwarn{color:#ffce54;}
.bcursor{display:inline-block;width:6px;height:12px;background:var(--c);margin-left:2px;vertical-align:middle;animation:bcblink 0.9s steps(2) infinite;}
@keyframes bcblink{50%{opacity:0;}}
#bootProgWrap{margin-top:1rem;padding-top:0.9rem;border-top:1px solid rgba(0,245,255,0.12);opacity:0;}
#bootProgLabel{display:flex;justify-content:space-between;font-family:"Orbitron",monospace;font-size:7px;letter-spacing:0.2em;color:rgba(0,245,255,0.55);text-transform:uppercase;margin-bottom:0.5rem;}
#bootProgTrack{width:100%;height:5px;background:rgba(0,245,255,0.08);border-radius:3px;overflow:hidden;position:relative;border:1px solid rgba(0,245,255,0.15);}
#bootProgFill{width:0%;height:100%;background:linear-gradient(90deg,#00aaff,#00f5ff,#00ff88);border-radius:3px;box-shadow:0 0 10px rgba(0,245,255,0.7);transition:width 0.18s linear;}
#bootGrantedWrap{display:flex;align-items:center;justify-content:center;gap:0.8rem;margin-top:1.3rem;opacity:0;transform:scale(0.85);}
#bootGrantedWrap.show{transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.34,1.56,0.64,1);opacity:1;transform:scale(1);}
#bootGrantedIcon{width:20px;height:20px;border-radius:50%;border:2px solid var(--g);display:flex;align-items:center;justify-content:center;color:var(--g);font-size:11px;box-shadow:0 0 14px rgba(0,255,136,0.6);flex-shrink:0;}
#bootGrantedText{font-family:"Orbitron",monospace;font-size:13px;letter-spacing:0.35em;color:var(--g);text-transform:uppercase;text-shadow:0 0 12px rgba(0,255,136,0.7);}
.bhc{position:fixed;width:24px;height:24px;z-index:4;border-color:rgba(0,245,255,0.3);border-style:solid;}
.bhc.tl{top:14px;left:14px;border-width:1.5px 0 0 1.5px;}.bhc.tr{top:14px;right:14px;border-width:1.5px 1.5px 0 0;}
.bhc.bl{bottom:14px;left:14px;border-width:0 0 1.5px 1.5px;}.bhc.br{bottom:14px;right:14px;border-width:0 1.5px 1.5px 0;}
@media(max-width:480px){#bootBox{padding:1.2rem 1rem 1.1rem;}#bootLog{font-size:9.5px;min-height:300px;}#bootHeaderTitle{font-size:7.5px;}}
</style>

<script>
var CHARS="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*!<>[]{}";

function glitchReveal(el,delay,isName,onDone){
  var original=el.getAttribute("data-text")||el.textContent;
  var steps=isName?30:18;var stepTime=isName?30:28;var step=0;
  setTimeout(function(){
    el.style.opacity="1";
    var iv=setInterval(function(){
      step++;
      var settled=Math.floor((step/steps)*original.length);
      var out="";
      for(var i=0;i<original.length;i++){out+=i<settled?original[i]:(Math.random()>0.4?CHARS[Math.floor(Math.random()*CHARS.length)]:original[i]);}
      el.textContent=out;
      if(step>=steps){clearInterval(iv);el.textContent=original;if(onDone)onDone();}
    },stepTime);
  },delay);
}

function fadeIn(el,delay){
  if(!el)return;
  setTimeout(function(){el.style.transition="opacity 0.5s";el.style.opacity="1";},delay);
}

function initBG(){
  var c=document.getElementById("bg"),ctx=c.getContext("2d"),t=0,W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();window.addEventListener("resize",resize);
  function draw(){
    ctx.clearRect(0,0,W,H);
    var bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W);
    bg.addColorStop(0,"#070f20");bg.addColorStop(0.5,"#030810");bg.addColorStop(1,"#010409");
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    var off=(t*0.4)%50;
    ctx.strokeStyle="rgba(0,245,255,0.035)";ctx.lineWidth=0.5;
    for(var x=-50+off;x<W+50;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(var y=-50+off;y<H+50;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.strokeStyle="rgba(0,100,255,0.04)";
    for(var i=0;i<16;i++){var angle=(i/16)*Math.PI*2;ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2+Math.cos(angle)*W,H/2+Math.sin(angle)*H);ctx.stroke();}
    [{x:0.2,y:0.3,r:300,col:"rgba(0,100,255,0.06)"},{x:0.8,y:0.7,r:250,col:"rgba(112,0,255,0.05)"},{x:0.5,y:0.5,r:400,col:"rgba(0,245,255,0.03)"}].forEach(function(n){
      var g=ctx.createRadialGradient(W*n.x,H*n.y,0,W*n.x,H*n.y,n.r);
      g.addColorStop(0,n.col);g.addColorStop(1,"transparent");
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    });
    t++;requestAnimationFrame(draw);
  }
  draw();
}

function initFX(){
  var c=document.getElementById("fx"),ctx=c.getContext("2d"),W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();window.addEventListener("resize",resize);
  var stars=[],rings=[];
  function draw(){
    ctx.clearRect(0,0,W,H);
    if(Math.random()<0.015)stars.push({x:Math.random()*W,y:Math.random()*H*0.5,vx:8+Math.random()*12,vy:3+Math.random()*5,life:1,len:80+Math.random()*120});
    if(Math.random()<0.003)rings.push({x:W/2+(Math.random()-0.5)*200,y:H/2+(Math.random()-0.5)*200,r:0,maxR:150+Math.random()*100});
    for(var i=stars.length-1;i>=0;i--){
      var s=stars[i];
      var g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*4,s.y-s.vy*4);
      g.addColorStop(0,"rgba(0,245,255,"+s.life+")");g.addColorStop(1,"transparent");
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*(s.len/20),s.y-s.vy*(s.len/20));
      ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();
      s.x+=s.vx;s.y+=s.vy;s.life-=0.025;if(s.life<=0)stars.splice(i,1);
    }
    for(var j=rings.length-1;j>=0;j--){
      var r=rings[j],life=1-r.r/r.maxR;
      ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
      ctx.strokeStyle="rgba(0,245,255,"+(life*0.4)+")";ctx.lineWidth=1;ctx.stroke();
      r.r+=2;if(r.r>=r.maxR)rings.splice(j,1);
    }
    requestAnimationFrame(draw);
  }
  draw();
}

function spawnParticles(){
  var colors=["#00f5ff","#00f5ff","#00f5ff","#0a84ff","#0a84ff","#7000ff","#00ff88","#ffffff","#00cfff","#40e0ff"];
  for(var i=0;i<160;i++){
    var p=document.createElement("div");p.className="pt";
    var r=Math.random();
    var size=r>0.97?6:r>0.88?4:r>0.65?2.5:r>0.35?1.5:1;
    var color=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText="left:"+Math.random()*100+"vw;width:"+size+"px;height:"+size+"px;background:"+color+";animation-duration:"+(7+Math.random()*15)+"s;animation-delay:"+(Math.random()*12)+"s;opacity:0;box-shadow:0 0 "+(size*5)+"px "+color+",0 0 "+(size*10)+"px "+color+"88;";
    document.body.appendChild(p);
  }
  for(var j=0;j<120;j++){
    var s=document.createElement("div");
    var sz=Math.random()>0.7?1.5:1;
    s.style.cssText="position:fixed;left:"+Math.random()*100+"vw;top:"+Math.random()*100+"vh;width:"+sz+"px;height:"+sz+"px;background:#e8f4ff;border-radius:50%;pointer-events:none;z-index:1;opacity:"+(0.1+Math.random()*0.25)+";animation:starTwinkle "+(3+Math.random()*5)+"s "+(Math.random()*6)+"s ease-in-out infinite;";
    document.body.appendChild(s);
  }
}

function startMainAnimations(){
  var card=document.querySelector(".card");
  var flickers=[0,80,160,200,320];
  flickers.forEach(function(t){setTimeout(function(){card.style.opacity=(Math.random()>0.5)?"0.4":"1";},t);});
  setTimeout(function(){card.style.opacity="1";},400);
  setTimeout(function(){
    glitchReveal(document.getElementById("mainName"),0,true,function(){
      fadeIn(document.getElementById("nameUL"),80);
      var sysIds=document.querySelectorAll(".sys-id.gi");
      sysIds.forEach(function(el,i){glitchReveal(el,150+i*180,false,null);});
      fadeIn(document.querySelector(".s-dot"),400);
      var sTxt=document.querySelector(".s-txt.gi");if(sTxt)glitchReveal(sTxt,500,false,null);
      var dt=document.querySelector(".dt.gi");if(dt)glitchReveal(dt,750,false,null);
      var links=document.querySelectorAll(".ll.gi");
      links.forEach(function(el,i){
        glitchReveal(el,900+i*160,false,null);
        var arrow=el.parentElement&&el.parentElement.querySelector(".la");
        if(arrow)fadeIn(arrow,1000+i*160);
      });
      fadeIn(document.querySelector(".footer"),2200);
    });
  },450);
}

window.addEventListener("load",function(){
  initBG();initFX();spawnParticles();
});

// ── AUDIO: start immediately on page load (not gated to boot typing) ──
(function(){
  var audio=document.getElementById("bgAudio");
  if(!audio)return;
  audio.volume=0;
  function tryPlay(){
    var p=audio.play();
    if(p!==undefined){
      p.then(function(){
        var v=0,fi=setInterval(function(){
          v=Math.min(v+0.04,0.7);audio.volume=v;
          if(v>=0.7)clearInterval(fi);
        },70);
      }).catch(function(){
        // Autoplay blocked by browser until first user gesture — start on first interaction instead
        var resume=function(){
          audio.play().then(function(){
            var v=0,fi=setInterval(function(){v=Math.min(v+0.04,0.7);audio.volume=v;if(v>=0.7)clearInterval(fi);},70);
          }).catch(function(){});
          document.removeEventListener("click",resume);
          document.removeEventListener("touchstart",resume);
          document.removeEventListener("keydown",resume);
        };
        document.addEventListener("click",resume,{once:true});
        document.addEventListener("touchstart",resume,{once:true});
        document.addEventListener("keydown",resume,{once:true});
      });
    }
  }
  tryPlay();
})();

// ── BOOT TERMINAL SEQUENCE ──
(function(){
  var boot=document.getElementById("bootScreen");
  var log=document.getElementById("bootLog");
  var progWrap=document.getElementById("bootProgWrap");
  var progFill=document.getElementById("bootProgFill");
  var progPct=document.getElementById("bootProgPct");
  var grantedWrap=document.getElementById("bootGrantedWrap");
  var blend=document.getElementById("blendOverlay");
  var body=document.body;

  var BOOT_LINES=[
    {p:"[BOOT]",m:"Initializing kernel modules",ok:true,delay:18},
    {p:"[SYS]", m:"Mounting secure filesystem /dev/sda1",ok:true,delay:16},
    {p:"[SYS]", m:"Checking memory integrity ... 16384MB OK",ok:true,delay:14},
    {p:"[NET]", m:"Establishing encrypted handshake",ok:true,delay:20},
    {p:"[NET]", m:"Resolving node identity ... ANAIT-CORE",ok:true,delay:16},
    {p:"[AUTH]",m:"Loading credential vault",ok:true,delay:18},
    {p:"[AUTH]",m:"Verifying signature ... valid",ok:true,delay:14},
    {p:"[GFX]", m:"Compiling HUD render pipeline",ok:true,delay:14},
    {p:"[GFX]", m:"Calibrating particle field",ok:true,delay:12},
    {p:"[WARN]",m:"Legacy cache detected ... purging",warn:true,delay:18},
    {p:"[SYS]", m:"Spinning up display adapter",ok:true,delay:14},
    {p:"[SYS]", m:"All modules nominal",ok:true,delay:12}
  ];

  var lineIdx=0;
  var typeSpeed=14;

  function typeLine(item,onDone){
    var row=document.createElement("div");row.className="bln";
    var prompt=document.createElement("span");prompt.className="bprompt";prompt.textContent=item.p;
    var msg=document.createElement("span");msg.className="bmsg";
    var cursor=document.createElement("span");cursor.className="bcursor";
    row.appendChild(prompt);row.appendChild(msg);row.appendChild(cursor);
    log.appendChild(row);
    row.style.opacity="1";
    var full=item.m;var i=0;
    var iv=setInterval(function(){
      i++;
      msg.textContent=full.slice(0,i);
      if(i>=full.length){
        clearInterval(iv);
        cursor.remove();
        var tag=document.createElement("span");
        tag.className=item.warn?"bwarn":"bok";
        tag.textContent=item.warn?"  [WARN]":"  [OK]";
        row.appendChild(tag);
        if(onDone)setTimeout(onDone,item.delay);
      }
    },typeSpeed);
  }

  function runLines(){
    if(lineIdx>=BOOT_LINES.length){
      runProgress();
      return;
    }
    typeLine(BOOT_LINES[lineIdx],function(){
      lineIdx++;
      runLines();
    });
  }

  function runProgress(){
    progWrap.style.transition="opacity 0.4s";
    progWrap.style.opacity="1";
    var pct=0;
    var iv=setInterval(function(){
      pct+=2+Math.random()*5;
      if(pct>=100){
        pct=100;clearInterval(iv);
        progFill.style.width="100%";
        progPct.textContent="100%";
        setTimeout(showGranted,250);
        return;
      }
      progFill.style.width=pct+"%";
      progPct.textContent=Math.floor(pct)+"%";
    },90);
  }

  function showGranted(){
    grantedWrap.classList.add("show");
    setTimeout(dissolveBoot,900);
  }

  function dissolveBoot(){
    blend.style.transition="opacity 1.3s ease";
    blend.style.opacity="1";
    boot.style.transition="opacity 0.9s ease, transform 0.9s cubic-bezier(0.4,0,0.2,1)";
    boot.style.transform="scale(1.04)";
    boot.style.opacity="0";
    var bg=document.getElementById("bg"),fx=document.getElementById("fx"),card=document.querySelector(".card");
    setTimeout(function(){
      body.classList.remove("locked");
      if(bg){bg.style.transition="opacity 1s ease";bg.style.opacity="1";}
      if(fx){fx.style.transition="opacity 1s ease";fx.style.opacity="1";}
      if(card){card.style.transition="opacity 0.9s ease";card.style.opacity="1";card.style.pointerEvents="auto";}
      startMainAnimations();
    },350);
    setTimeout(function(){
      blend.style.opacity="0";
    },700);
    setTimeout(function(){
      if(boot&&boot.parentNode)boot.parentNode.removeChild(boot);
    },1700);
  }

  function initBootFX(){
    var c=document.getElementById("bootFX"),ctx=c.getContext("2d"),W,H;
    function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
    resize();window.addEventListener("resize",resize);
    var bits=[];
    for(var i=0;i<28;i++){bits.push({x:Math.random()*W,y:Math.random()*H,s:8+Math.random()*6,v:0.3+Math.random()*0.6,ch:"01"[Math.floor(Math.random()*2)],op:0.04+Math.random()*0.08});}
    function draw(){
      ctx.clearRect(0,0,W,H);
      var g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
      g.addColorStop(0,"#050d18");g.addColorStop(1,"#010409");
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      ctx.font="12px monospace";
      bits.forEach(function(b){
        ctx.fillStyle="rgba(0,245,255,"+b.op+")";
        ctx.fillText(b.ch,b.x,b.y);
        b.y+=b.v;
        if(b.y>H){b.y=-10;b.x=Math.random()*W;b.ch="01"[Math.floor(Math.random()*2)];}
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  initBootFX();
  setTimeout(runLines,300);
})();
</script>
</body>
</html>
